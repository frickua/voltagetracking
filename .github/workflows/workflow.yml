name: Main workflow
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
jobs:
  register-new-channels:
    #TODO: prepare own docker image to speedup startup
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TZ: "Europe/Kyiv"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f py-scripts/channel-registration/requirements.txt ]; then pip install -r channel-registration/requirements.txt; fi

      - name: Run Channel Registration script
        run: python py-scripts/channel-registration/channel-registration.py
  process-chart-updates:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
      TZ: "Europe/Kyiv"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f py-scripts/charts-processing/requirements.txt ]; then pip install -r charts-processing/requirements.txt; fi

      - name: Run Chart processing script
        run: python py-scripts/charts-processing/charts-processing.py
